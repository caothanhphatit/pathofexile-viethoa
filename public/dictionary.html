  <div data-component="site-header"></div>

  <main class="poe-shell-container grid gap-6 py-6" id="main">
    
    <!-- Premium Header Dashboard Panel -->
    <section class="glass-panel rounded-2xl p-6 shadow-sm dark:border-slate-800/80" aria-label="Từ điển thuật ngữ">
      <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">

        <div class="flex flex-wrap items-center gap-2 md:justify-end">

            <span class="material-symbols-rounded text-base" aria-hidden="true">arrow_back</span>Tra cứu
          </a>
          <div class="inline-flex h-10 w-fit items-center gap-2 rounded-xl border border-slate-200 bg-slate-50/80 px-3.5 text-xs font-black text-slate-700 backdrop-blur dark:border-slate-800 dark:bg-slate-900/60 dark:text-slate-200">
            <span class="material-symbols-rounded text-sm text-amber-500" aria-hidden="true">format_list_bulleted</span>

        <select class="h-12 rounded-xl border border-slate-200 bg-white px-3.5 text-xs font-black text-slate-700 outline-none dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200" id="categoryFilter" name="category" aria-label="Lọc theo nhóm"></select>
        
        <button class="inline-flex h-12 items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-3 text-xs font-black text-slate-700 transition hover:bg-slate-100 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800" id="resetFilters" type="button">

  <!-- Interactive Detail Modal Popup -->
  <div id="termModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-slate-950/70 backdrop-blur-sm transition-all duration-300" role="dialog" aria-modal="true" aria-labelledby="modalTitle">

        </div>
        <button class="grid h-8 w-8 place-items-center rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-white transition" id="closeModalBtn" type="button" aria-label="Đóng hộp thoại">

      <!-- Modal Body -->
      <div class="px-6 py-5 max-h-[70vh] overflow-y-auto">
        <!-- Vietnamese Meaning -->
        <div>
          <h3 class="text-xs font-black text-amber-600 dark:text-amber-400 uppercase tracking-wider">Giải nghĩa Việt hóa</h3>
          <p class="mt-2 text-sm md:text-base font-semibold leading-relaxed text-slate-800 dark:text-slate-200" id="modalMeaning"></p>
        </div>

        <!-- Original quote -->
        <div class="mt-5 border-t border-slate-100 pt-4 dark:border-slate-800/40" id="modalOriginalContainer">
          <p class="rounded-lg border border-slate-100 bg-slate-50/50 p-3 text-xs font-semibold leading-relaxed text-slate-600 dark:border-slate-800/40 dark:bg-slate-950/40 dark:text-slate-400 italic" id="modalOriginal" translate="no"></p>
        </div>

        <!-- Variants Chips -->
        <div class="mt-5 border-t border-slate-100 pt-4 dark:border-slate-800/40" id="modalVariantsContainer">

          <div class="mt-2 flex flex-wrap gap-1.5" id="modalVariants"></div>

        <div class="mt-5 border-t border-slate-100 pt-4 dark:border-slate-800/40" id="modalComments" data-comments-slot></div>

      <!-- Modal Footer -->
      <div class="border-t border-slate-100 bg-slate-50/50 px-6 py-3.5 flex justify-end dark:border-slate-800/60 dark:bg-slate-900/60">
        <button class="rounded-xl bg-slate-900 px-4 py-2 text-xs font-black text-white hover:bg-slate-800 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-100 transition shadow-sm" id="modalActionClose" type="button">Đóng</button>
      </div>

  <script src="components/poe-ui-utils.js"></script>
  <script src="data/dictionary-data.js"></script>
  <script src="components/translation-comments.js"></script>
  <script>
    const dictionaryData = window.POE2_DICTIONARY_TERMS || { categories: {}, terms: [] };
    const categories = dictionaryData.categories || {};
    const CATEGORY_LABELS_EN = {
      combat: "Combat",
      damage: "Damage & ailments",
      resource: "Resources",
      defense: "Defense",
      skill: "Skills & minions",
      item: "Items & crafting",
      endgame: "Endgame"
    };
    const PAGE_TEXT = {
      documentTitle: { vi: "Từ điển Thuật ngữ Path of Exile 2 - POE2 Việt hóa", en: "Path of Exile 2 Glossary - POE2 Vietnamese" },
      skipNavigation: { vi: "Bỏ qua điều hướng", en: "Skip navigation" },
      heroLabel: { vi: "Từ điển thuật ngữ", en: "Glossary" },
      heroTitle: { vi: "Từ điển thuật ngữ", en: "Glossary" },
      heroSubtitle: { vi: "Tra cứu định nghĩa nâng cao và so chiếu thuật ngữ PoE2", en: "Look up advanced definitions and compare POE2 terms" },
      searchPlaceholder: { vi: "Tìm kiếm thuật ngữ, định nghĩa, từ đồng nghĩa...", en: "Search terms, definitions, synonyms..." },
      searchLabel: { vi: "Tìm thuật ngữ", en: "Search terms" },
      categoryLabel: { vi: "Lọc theo nhóm", en: "Filter by category" },
      categoryPillsLabel: { vi: "Nhóm thuật ngữ", en: "Term categories" },
      termUnit: { vi: "thuật ngữ", en: "terms" },
      resultMeta: { vi: "{filtered} / {total} kết quả", en: "{filtered} / {total} results" },
      empty: { vi: "Không tìm thấy thuật ngữ phù hợp với bộ lọc hiện tại.", en: "No terms match the current filters." },
      meaningHeading: { vi: "Giải nghĩa Việt hóa", en: "Meaning" },
      originalHeading: { vi: "Gốc PoE2DB", en: "Vietnamese note" },
      variantsHeading: { vi: "Từ đồng nghĩa / Biến thể", en: "Synonyms / variants" },
      feedback: { vi: "Góp ý dịch", en: "Suggest translation" },
      general: { vi: "General", en: "General" }
    };
    const terms = [...(dictionaryData.terms || [])].sort((a, b) => a.term.localeCompare(b.term, "en"));
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const categoryPills = document.getElementById("categoryPills");
    const resetFilters = document.getElementById("resetFilters");
    const termGrid = document.getElementById("termGrid");
    const emptyState = document.getElementById("emptyState");
    const resultMeta = document.getElementById("resultMeta");
    const termCount = document.getElementById("termCount");

    // Modal elements
    const termModal = document.getElementById("termModal");
    const modalContent = document.getElementById("modalContent");
    const modalTitle = document.getElementById("modalTitle");
    const modalCategory = document.getElementById("modalCategory");
    const modalMeaning = document.getElementById("modalMeaning");
    const modalOriginal = document.getElementById("modalOriginal");
    const modalOriginalContainer = document.getElementById("modalOriginalContainer");
    const modalVariants = document.getElementById("modalVariants");
    const modalVariantsContainer = document.getElementById("modalVariantsContainer");
    const modalComments = document.getElementById("modalComments");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalActionClose = document.getElementById("modalActionClose");

    const {
      currentLocale,
      escapeHtml,
      formatNumber,
      i18nText,
      localeText,
      onLocaleChange
    } = window.PoeUi;
    const pageText = (key) => i18nText(PAGE_TEXT[key], key);
    const categoryLabel = (key) => currentLocale() === "en"
      ? CATEGORY_LABELS_EN[key] || key || pageText("general")
      : categories[key] || key || pageText("general");
    const termMeaning = (term) => currentLocale() === "en"
      ? (term.description_en || term.meaning || "")
      : (term.meaning || term.description_en || "");
    const termOriginal = (term) => currentLocale() === "en"
      ? (term.description_en ? term.meaning : "")
      : term.description_en;

    const normalizeText = (value) => String(value ?? "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");

    const searchableText = (term) => normalizeText([
      term.term,
      categories[term.category],
      CATEGORY_LABELS_EN[term.category],
      term.meaning,
      term.keep,
      term.description_en,
      ...(term.variants || []),
      ...(term.examples || [])
    ].join(" "));

    const categoryEntries = Object.entries(categories)
      .filter(([key]) => terms.some((term) => term.category === key));

    const clipText = (text, maxLength = 140) => {
      if (text.length <= maxLength) return text;
      const clipped = text.slice(0, maxLength).replace(/\s+\S*$/, "").trim();
      return `${clipped || text.slice(0, maxLength).trim()}...`;
    };

    const compactMeaning = (term) => {
      const meaning = String(termMeaning(term) || "").trim();
      return clipText(meaning);
    };

    const renderCategoryOptions = () => {
      const previousCategory = categoryFilter.value || "";
      categoryFilter.innerHTML = [
        `<option value="">${escapeHtml(localeText("allGroups"))}</option>`,
        ...categoryEntries.map(([key]) => `<option value="${escapeHtml(key)}">${escapeHtml(categoryLabel(key))}</option>`)
      ].join("");
      if ([...categoryFilter.options].some((option) => option.value === previousCategory)) {
        categoryFilter.value = previousCategory;
      }
    };

    const setCategory = (category) => {
      categoryFilter.value = category || "";
      renderTerms();
    };

    const renderCategoryPills = () => {
      const current = categoryFilter.value;
      const allActive = current === "";
      categoryPills.innerHTML = [
        `<button class="category-pill inline-flex h-9 items-center gap-1.5 rounded-xl border border-slate-200 bg-white px-3 text-xs font-black text-slate-700 transition hover:bg-slate-100 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800" type="button" data-category="" aria-pressed="${allActive}">${escapeHtml(localeText("all"))}</button>`,
        ...categoryEntries.map(([key]) => {
          const count = terms.filter((term) => term.category === key).length;
          return `<button class="category-pill inline-flex h-9 items-center gap-1.5 rounded-xl border border-slate-200 bg-white px-3 text-xs font-black text-slate-700 transition hover:bg-slate-100 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800" type="button" data-category="${escapeHtml(key)}" aria-pressed="${current === key}">${escapeHtml(categoryLabel(key))} <span class="opacity-60 font-display">${formatNumber(count)}</span></button>`;
        })
      ].join("");
    };

    const renderTermCard = (term) => {
      const meaning = compactMeaning(term);
      const category = categoryLabel(term.category);

      return `
        <article class="term-card flex h-full flex-col rounded-2xl border border-l-4 border-slate-200 border-l-amber-500/80 bg-white p-5 shadow-sm transition hover:border-amber-300/60 hover:shadow-glow dark:border-slate-800 dark:border-l-amber-500/60 dark:bg-slate-900 cursor-pointer" data-term="${escapeHtml(term.term)}">
          <div class="flex items-start justify-between gap-3">
            <h2 class="break-words text-lg font-black leading-tight text-slate-950 dark:text-white" translate="no">${escapeHtml(term.term)}</h2>
            <span class="shrink-0 rounded-md border border-amber-100 bg-amber-50/50 px-2 py-0.5 text-[10px] font-black text-amber-700 dark:border-amber-950/40 dark:bg-amber-950/40 dark:text-amber-400 uppercase tracking-wider">${escapeHtml(category)}</span>
          </div>
          <p class="term-meaning mt-3 text-sm font-semibold leading-relaxed text-slate-600 dark:text-slate-300" title="${escapeHtml(termMeaning(term))}">${escapeHtml(meaning)}</p>
          <div class="mt-4 pt-3 border-t border-slate-50 flex flex-wrap items-center justify-between gap-2 text-[10px] font-black text-slate-400 group-hover:text-amber-500 dark:border-slate-800/40">
            <button class="inline-flex items-center gap-1 rounded-lg border border-blue-200 bg-blue-50 px-2.5 py-1.5 text-[11px] font-black text-blue-700 transition hover:bg-blue-600 hover:text-white dark:border-blue-900/60 dark:bg-blue-950/30 dark:text-blue-300 dark:hover:bg-blue-500 dark:hover:text-white" type="button" data-no-tooltip data-comment-trigger data-comment-entity-type="dictionary" data-comment-entity-id="${escapeHtml(term.term)}" data-comment-entity-name="${escapeHtml(term.term)}" data-comment-field-path="meaning" data-comment-source-text="${escapeHtml(term.description_en || "")}" data-comment-translated-text="${escapeHtml(term.meaning || "")}">
              <span class="material-symbols-rounded text-sm" aria-hidden="true">rate_review</span>
              ${escapeHtml(pageText("feedback"))}
            </button>
            <span class="flex items-center gap-1">${escapeHtml(localeText("detail").toLocaleUpperCase(currentLocale() === "en" ? "en" : "vi"))} <span class="material-symbols-rounded text-sm">open_in_new</span></span>
          </div>
        </article>
      `;
    };

    const renderTerms = () => {
      const query = normalizeText(searchInput.value.trim());
      const category = categoryFilter.value;
      const filtered = terms.filter((term) => {
        const matchesCategory = !category || term.category === category;
        const matchesSearch = !query || searchableText(term).includes(query);
        return matchesCategory && matchesSearch;
      });

      termGrid.innerHTML = filtered.map(renderTermCard).join("");
      termCount.textContent = `${formatNumber(terms.length)} ${pageText("termUnit")}`;
      resultMeta.textContent = pageText("resultMeta")
        .replace("{filtered}", formatNumber(filtered.length))
        .replace("{total}", formatNumber(terms.length));
      emptyState.classList.toggle("hidden", filtered.length > 0);
      renderCategoryPills();
    };

    const applyPageLocale = () => {
      document.title = pageText("documentTitle");
      document.querySelector(".skip-link") && (document.querySelector(".skip-link").textContent = pageText("skipNavigation"));
      document.querySelector("main > section:first-child")?.setAttribute("aria-label", pageText("heroLabel"));
      document.querySelector("h1") && (document.querySelector("h1").textContent = pageText("heroTitle"));
      document.querySelector("main > section:first-child p") && (document.querySelector("main > section:first-child p").textContent = pageText("heroSubtitle"));
      document.querySelector("[data-lookup-back]")?.lastChild && (document.querySelector("[data-lookup-back]").lastChild.textContent = localeText("backLookup"));
      searchInput.placeholder = pageText("searchPlaceholder");
      searchInput.setAttribute("aria-label", pageText("searchLabel"));
      categoryFilter.setAttribute("aria-label", pageText("categoryLabel"));
      categoryPills.setAttribute("aria-label", pageText("categoryPillsLabel"));
      resetFilters.lastChild.textContent = localeText("resetFilters");
      emptyState.lastChild.textContent = pageText("empty");
      document.querySelector("#modalMeaning")?.previousElementSibling && (document.querySelector("#modalMeaning").previousElementSibling.textContent = pageText("meaningHeading"));
      document.querySelector("#modalOriginal")?.previousElementSibling && (document.querySelector("#modalOriginal").previousElementSibling.textContent = pageText("originalHeading"));
      document.querySelector("#modalVariants")?.previousElementSibling && (document.querySelector("#modalVariants").previousElementSibling.textContent = pageText("variantsHeading"));
      closeModalBtn.setAttribute("aria-label", localeText("close"));
      modalActionClose.textContent = localeText("close");
    };

    // Modal Control Functions
    const openModal = (termName) => {
      const termObj = terms.find((t) => t.term.toLowerCase() === termName.toLowerCase());
      if (!termObj) return;
      activeTermName = termName;

      modalTitle.textContent = termObj.term;
      modalCategory.textContent = categoryLabel(termObj.category);
      modalMeaning.textContent = termMeaning(termObj);
      
      // Original tooltip text
      const originalText = termOriginal(termObj);
      if (originalText) {
        modalOriginal.textContent = originalText;
        modalOriginalContainer.classList.remove("hidden");
      } else {
        modalOriginalContainer.classList.add("hidden");
      }

      // Variants
      const list = [...new Set([
        ...(termObj.variants || []),
        ...(termObj.examples || [])
      ])].filter((v) => v.toLowerCase() !== termObj.term.toLowerCase());

      if (list.length > 0) {
        modalVariants.innerHTML = list.map((v) => `
          <span class="rounded bg-slate-100 dark:bg-slate-800 text-[11px] font-bold text-slate-700 dark:text-slate-300 px-2.5 py-1 border border-slate-200/40 dark:border-slate-700/40">${escapeHtml(v)}</span>
        `).join("");
        modalVariantsContainer.classList.remove("hidden");
      } else {
        modalVariantsContainer.classList.add("hidden");
      }

      window.PoeTranslationComments?.mount(modalComments, {
        entityType: "dictionary",
        entityId: termObj.term,
        entityName: termObj.term,
        fieldPath: "meaning",
        sourceText: termObj.description_en || "",
        translatedText: termObj.meaning || ""
      });

      termModal.classList.remove("hidden");
      termModal.classList.add("flex");
      
      // Animate scaling in
      setTimeout(() => {
        modalContent.classList.remove("scale-95");
        modalContent.classList.add("scale-100");
      }, 10);
    };

    const closeModal = () => {
      activeTermName = null;
      modalContent.classList.remove("scale-100");
      modalContent.classList.add("scale-95");
      
      setTimeout(() => {
        termModal.classList.add("hidden");
        termModal.classList.remove("flex");
      }, 150);
    };

    let activeTermName = null;
    applyPageLocale();
    renderCategoryOptions();
    
    // Read search query parameter from URL on load
    const params = new URLSearchParams(window.location.search);
    const initialQuery = params.get("q") || params.get("search") || "";
    if (initialQuery) {
      searchInput.value = initialQuery;
      
      // If query is an exact term match, open modal automatically!
      const exactMatch = terms.some((t) => t.term.toLowerCase() === initialQuery.toLowerCase());
      if (exactMatch) {
        setTimeout(() => openModal(initialQuery), 200);
      }
    }
    
    renderTerms();
    onLocaleChange(() => {
      applyPageLocale();
      renderCategoryOptions();
      renderTerms();
      if (activeTermName && !termModal.classList.contains("hidden")) {
        openModal(activeTermName);
      }
    });

    searchInput.addEventListener("input", renderTerms);
    categoryFilter.addEventListener("change", renderTerms);
    categoryPills.addEventListener("click", (event) => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      setCategory(button.dataset.category);
    });
    resetFilters.addEventListener("click", () => {
      searchInput.value = "";
      setCategory("");
      searchInput.focus();
    });

    // Delegate clicks inside termGrid to open modal
    termGrid.addEventListener("click", (event) => {
      if (event.target.closest("[data-comment-trigger]")) return;
      const card = event.target.closest("[data-term]");
      if (!card) return;
      openModal(card.dataset.term);
    });

    // Close modal triggers
    closeModalBtn.addEventListener("click", closeModal);
    modalActionClose.addEventListener("click", closeModal);
    termModal.addEventListener("click", (e) => {
      if (e.target === termModal) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !termModal.classList.contains("hidden")) {
        closeModal();
      }
    });
  </script>
</body>

</html>
