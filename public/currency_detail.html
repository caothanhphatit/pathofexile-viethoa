<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency - POE2</title>
  <meta name="description" content="Trang chi tiết Currency Path of Exile 2 tiếng Việt, mô tả tác dụng, subtype, stack, effect và item liên quan.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" href="https://poeviethoa.net/currency-detail">
  <link rel="alternate" hreflang="vi" href="https://poeviethoa.net/currency-detail">
  <meta property="og:locale" content="vi_VN">
  <meta property="og:site_name" content="POE2 Việt hóa">
  <meta property="og:type" content="article">
  <meta property="og:title" content="Currency Path of Exile 2 tiếng Việt">
  <meta property="og:description" content="Trang chi tiết Currency Path of Exile 2 tiếng Việt, mô tả tác dụng, subtype, stack, effect và item liên quan.">
  <meta property="og:url" content="https://poeviethoa.net/currency-detail">
  <meta property="og:image" content="https://poeviethoa.net/assets/img/logo.jpg">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Currency Path of Exile 2 tiếng Việt">
  <meta name="twitter:description" content="Trang chi tiết Currency POE2 tiếng Việt, gồm tác dụng, subtype, stack, effect và item liên quan.">
  <meta name="twitter:image" content="https://poeviethoa.net/assets/img/logo.jpg">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/favicon.png" type="image/png" sizes="64x64">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script src="components/theme-boot.js"></script>
  <link rel="preload" href="/assets/fonts/material-symbols-rounded.woff2" as="font" type="font/woff2" crossorigin>
  <link href="dist/app.css?v=20260529-font-ui" rel="stylesheet">
  <script defer src="app-routes.js"></script>
  <script defer src="components/app-shell.js"></script>
  <style>
    .stat-line + .stat-line { border-top: 1px solid rgb(226 232 240); }
    .dark .stat-line + .stat-line { border-top-color: rgb(30 41 59); }
  </style>
</head>

<body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
  <div data-component="site-header" data-subtitle="Currency"></div>

  <main class="poe-shell-container grid gap-5 py-5" id="detailRoot"></main>

  <script src="components/poe-ui-utils.js"></script>
  <script src="components/translation-comments.js"></script>
  <script src="data/currency-data.js"></script>
  <script>
    const data = window.POE2_CURRENCY || { items: [] };
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug") || "";
    const rawItem = (data.items || []).find((entry) => entry.slug === slug && entry.status === "active");
    let item = null;
    const detailRoot = document.getElementById("detailRoot");
    const PAGE_TEXT = {
      notFoundTitle: { vi: "Không tìm thấy currency", en: "Currency not found" },
      notFoundDescription: { vi: "Item này không có trong dữ liệu hiện tại.", en: "This item is not available in the current data." },
      notFoundDocumentTitle: { vi: "Không tìm thấy currency - POE2", en: "Currency not found - POE2" },
      noData: { vi: "Không có dữ liệu.", en: "No data available." },
      group: { vi: "Nhóm", en: "Group" },
      info: { vi: "Thông tin", en: "Information" },
      effect: { vi: "Effect", en: "Effect" },
      related: { vi: "Liên quan", en: "Related" },
      detail: { vi: "Chi tiết", en: "Details" },
      expeditionBlackScythe: { vi: "Vật phẩm Expedition dùng để mặc cả (barter) mua các loại trang bị, tiền tệ với thương nhân Tujen.", en: "An Expedition artifact used to barter for equipment and currency with Tujen." },
      expeditionOrder: { vi: "Vật phẩm Expedition dùng để nâng cấp, chế tạo (craft) các loại trang bị với thương nhân Rog.", en: "An Expedition artifact used to upgrade and craft equipment with Rog." },
      expeditionDruidic: { vi: "Vật phẩm Expedition dùng để mua bán ngẫu nhiên (gamble) nhận các loại trang bị với thương nhân Gwennen.", en: "An Expedition artifact used to gamble for equipment with Gwennen." },
      expeditionSun: { vi: "Vật phẩm Expedition dùng để giao dịch, đổi các loại Artifact khác với thủ lĩnh Dannig.", en: "An Expedition artifact used to trade and exchange other artifacts with Dannig." },
      expeditionGeneric: { vi: "Vật phẩm đặc biệt dùng để giao dịch và trao đổi vật phẩm với các thương nhân Expedition.", en: "A special item used to trade with Expedition merchants." },
      shard: { vi: "Mảnh tiền tệ, gom đủ stack để tự động chuyển thành tiền tệ hoàn chỉnh.", en: "A currency shard. Collect a full stack to automatically form the complete currency item." },
      splinter: { vi: "Mảnh vỡ dùng để gom đủ stack mở khóa cổng vào boss hoặc bản đồ liên quan.", en: "A splinter used to complete a stack and unlock the related boss encounter or map." },
      catalyst: { vi: "Dùng để tăng chất lượng (Quality) và các thuộc tính tương ứng trên trang sức.", en: "Improves quality and matching modifiers on jewellery." },
      essence: { vi: "Dùng để nâng cấp một trang bị thường thành trang bị hiếm với một thuộc tính cố định.", en: "Upgrades a normal item into a rare item with a fixed modifier." },
      delirium: { vi: "Dùng để tác động vào bản đồ nhằm tăng độ khó và thêm phần thưởng Delirium tương ứng.", en: "Applies Delirium effects to maps, increasing difficulty and adding matching rewards." },
      mapItem: { vi: "Vật phẩm đặc biệt dùng để mở hoặc tác động lên bản đồ.", en: "A special item used to open or modify a map." }
    };

    const {
      escapeHtml,
      i18nText,
      i18nList,
      currentLocale,
      localeText,
      onLocaleChange,
      hasCurrencyDescription,
      currencySubtypeLabel,
      currencyCategoryLabel,
      updateDocumentSeo
    } = window.PoeUi;
    const pageText = (key) => i18nText(PAGE_TEXT[key], key);
    item = hasCurrencyDescription(rawItem) ? rawItem : null;

    const fallbackDescription = (entry) => {
      if (!entry) return pageText("noData");
      const subtype = String(entry.subtype || entry.family || "").toLowerCase();
      const category = String(entry.category || "").toLowerCase();
      const nameLower = String(entry.name || "").toLowerCase();

      if (subtype === "expedition-artifact" || category === "expeditionartifact") {
        if (nameLower.includes("black scythe")) {
          return pageText("expeditionBlackScythe");
        } else if (nameLower.includes("order")) {
          return pageText("expeditionOrder");
        } else if (nameLower.includes("druidic")) {
          return pageText("expeditionDruidic");
        } else if (nameLower.includes("sun")) {
          return pageText("expeditionSun");
        } else {
          return pageText("expeditionGeneric");
        }
      }

      if (subtype === "shard" || nameLower.endsWith("shard")) {
        return pageText("shard");
      }
      if (subtype === "splinter" || category === "splinteritem" || nameLower.endsWith("splinter")) {
        return pageText("splinter");
      }
      if (subtype === "catalyst" || category === "catalystitem" || nameLower.endsWith("catalyst")) {
        return pageText("catalyst");
      }
      if (subtype === "essence" || category === "essence" || nameLower.includes("essence")) {
        return pageText("essence");
      }
      if (subtype.includes("delirium") || nameLower.includes("distilled") || nameLower.includes("delirium")) {
        return pageText("delirium");
      }

      return pageText("mapItem");
    };

    const renderLines = (lines = []) => lines.length
      ? lines.map((line) => `<li class="stat-line px-4 py-3 text-sm font-semibold leading-6 text-slate-700 dark:text-slate-200">${escapeHtml(line)}</li>`).join("")
      : `<li class="px-4 py-3 text-sm font-semibold text-slate-500 dark:text-slate-400">${escapeHtml(pageText("noData"))}</li>`;

    const itemSubtypeLabel = currencySubtypeLabel;
    const itemCategoryLabel = currencyCategoryLabel;

    const sectionBlock = (title, lines) => `
      <section class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div class="border-b border-slate-200 px-4 py-3 dark:border-slate-800">
          <h2 class="text-sm font-black uppercase tracking-[.14em] text-slate-500 dark:text-slate-400">${escapeHtml(title)}</h2>
        </div>
        <ul>${renderLines(lines)}</ul>
      </section>
    `;

    const effectBlock = (entry) => {
      const mods = entry.mods || [];
      const modsVi = i18nList(entry.i18n?.mods, mods);
      const description = i18nText(entry.i18n?.description, entry.description_en || fallbackDescription(entry));
      const lines = mods.length ? mods.map((line, index) => `
        <li class="stat-line px-4 py-3">
          <p class="text-sm font-bold leading-6 text-slate-800 dark:text-slate-100">${escapeHtml(modsVi[index] || description || line)}</p>
          <p class="mt-1 text-xs font-semibold leading-5 text-slate-500 dark:text-slate-400">${escapeHtml(line)}</p>
        </li>
      `).join("") : `<li class="px-4 py-3 text-sm font-semibold text-slate-500 dark:text-slate-400">${escapeHtml(fallbackDescription(entry))}</li>`;
      return `
        <section class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
          <div class="border-b border-slate-200 px-4 py-3 dark:border-slate-800">
            <h2 class="text-sm font-black uppercase tracking-[.14em] text-slate-500 dark:text-slate-400">${escapeHtml(pageText("effect"))}</h2>
          </div>
          <ul>${lines}</ul>
        </section>
      `;
    };

    const renderRelatedCurrencyItems = (entry) => {
      const related = entry.related_items || [];
      if (related.length === 0) return "";

      const cards = related.map((rel) => {
        const target = (data.items || []).find((e) => e.slug === rel.slug && e.status === "active");
        const isClickable = !!target;

        let name = rel.name;
        let desc = rel.description_en || "";

        if (target) {
          name = i18nText(target.i18n?.name, target.name);
          desc = i18nText(target.i18n?.description, target.description_en) || desc;
        }

        return `
          <li class="group relative flex items-start gap-3.5 p-4 rounded-xl border border-slate-200/60 bg-white shadow-sm transition-all duration-300 hover:-translate-y-0.5 hover:shadow-md hover:border-amber-500/30 dark:border-slate-800/50 dark:bg-slate-900/40 dark:hover:bg-slate-900/60 dark:hover:border-amber-500/30">
            <div class="relative grid h-11 w-11 shrink-0 place-items-center overflow-hidden rounded-xl border border-slate-200/80 bg-slate-950 transition-all duration-300 group-hover:scale-105 group-hover:border-amber-500/40 dark:border-slate-800 dark:bg-slate-950">
              <img class="absolute inset-0 h-full w-full object-contain p-1 transition-transform duration-300 group-hover:rotate-3" src="${escapeHtml(rel.icon_url)}" alt="${escapeHtml(name)}" width="44" height="44">
            </div>
            <div class="min-w-0 flex-1">
              <div class="flex items-center justify-between gap-3">
                <h4 class="font-display text-sm font-black tracking-tight text-slate-900 transition-colors duration-200 group-hover:text-amber-500 dark:text-slate-100 dark:group-hover:text-amber-400" translate="no">${escapeHtml(name)}</h4>
                ${isClickable ? `
                  <a class="inline-flex items-center gap-1 text-[11px] font-black uppercase tracking-wider text-blue-600 dark:text-blue-400 px-2.5 py-1 rounded bg-blue-50 hover:bg-blue-600 hover:text-white dark:bg-blue-950/40 dark:hover:bg-blue-500 dark:hover:text-white transition-all duration-200" href="/currency-detail?slug=${encodeURIComponent(rel.slug)}">
                    ${escapeHtml(pageText("detail"))}
                  </a>
                ` : ""}
              </div>
              <p class="mt-1.5 text-xs font-semibold leading-relaxed text-slate-500 dark:text-slate-300/95 leading-normal">${escapeHtml(desc)}</p>
            </div>
          </li>
        `;
      }).join("");

      return `
        <section class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900" id="cmodalRelatedContainer">
          <div class="border-b border-slate-200 px-4 py-3 dark:border-slate-800">
            <h2 class="text-sm font-black uppercase tracking-[.14em] text-slate-500 dark:text-slate-400">${escapeHtml(pageText("related"))}</h2>
          </div>
          <ul>${cards}</ul>
        </section>
      `;
    };

    const renderDetail = () => {
    if (!item) {
      document.title = pageText("notFoundDocumentTitle");
      document.querySelector('meta[name="robots"]')?.setAttribute("content", "noindex,follow");
      detailRoot.innerHTML = `
        <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-md1 dark:border-slate-800 dark:bg-slate-900">
          <a class="inline-flex items-center gap-2 text-sm font-black text-blue-700 dark:text-blue-300" href="/currency"><span class="material-symbols-rounded text-base" aria-hidden="true">arrow_back</span>Currency</a>
          <h1 class="mt-4 text-3xl font-black text-slate-950 dark:text-white">${escapeHtml(pageText("notFoundTitle"))}</h1>
          <p class="mt-2 text-sm font-semibold leading-6 text-slate-600 dark:text-slate-300">${escapeHtml(pageText("notFoundDescription"))}</p>
        </section>
      `;
    } else {
      const description = i18nText(item.i18n?.description, item.description_en || fallbackDescription(item));
      updateDocumentSeo({
        title: `${item.name} - Currency POE2`,
        description,
        canonicalPath: `/currency-detail?slug=${encodeURIComponent(item.slug)}`,
        image: item.icon_url || "/assets/img/logo.jpg"
      });
      detailRoot.innerHTML = `
        <section class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-md1 dark:border-slate-800 dark:bg-slate-900">
          <div class="grid gap-0 lg:grid-cols-[minmax(0,1fr)_280px]">
            <div class="p-5 sm:p-7">
              <a class="inline-flex items-center gap-2 text-sm font-black text-blue-700 dark:text-blue-300" href="/currency"><span class="material-symbols-rounded text-base" aria-hidden="true">arrow_back</span>Currency</a>
              <div class="mt-5 flex items-start gap-4">
                <div class="relative grid h-16 w-16 shrink-0 place-items-center overflow-hidden rounded-lg border border-slate-200 bg-slate-950 text-white dark:border-slate-700">
                  <span class="material-symbols-rounded opacity-80" aria-hidden="true">toll</span>
                  <img class="absolute inset-0 h-full w-full object-contain p-1" src="${escapeHtml(item.icon_url)}" alt="${escapeHtml(item.icon_alt || item.name)}" width="64" height="64" onerror="this.remove()">
                </div>
                <div class="min-w-0">
                  <h1 class="break-words text-4xl font-black leading-tight text-slate-950 dark:text-white" translate="no">${escapeHtml(item.name)}</h1>
                  <p class="mt-2 text-sm font-black text-slate-500 dark:text-slate-400">${escapeHtml(itemCategoryLabel(item))} · ${escapeHtml(itemSubtypeLabel(item))}${item.stack_size ? ` · Stack ${escapeHtml(item.stack_size)}` : ""}</p>
                </div>
              </div>
              <p class="mt-6 max-w-4xl text-base font-semibold leading-8 text-slate-700 dark:text-slate-200">${escapeHtml(description)}</p>
              ${currentLocale() === "vi" && item.description_en ? `<p class="mt-3 max-w-4xl text-sm font-medium leading-7 text-slate-500 dark:text-slate-400">${escapeHtml(item.description_en)}</p>` : ""}
            </div>
            <aside class="grid content-start gap-3 border-t border-slate-200 bg-slate-50 p-5 dark:border-slate-800 dark:bg-slate-950/60 lg:border-l lg:border-t-0">
              <div class="rounded-lg border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
                <p class="text-xs font-black uppercase tracking-[.14em] text-slate-500 dark:text-slate-400">${escapeHtml(pageText("group"))}</p>
                <p class="mt-2 text-lg font-black text-slate-950 dark:text-white">${escapeHtml(itemCategoryLabel(item))}</p>
              </div>
              <div class="rounded-lg border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
                <p class="text-xs font-black uppercase tracking-[.14em] text-slate-500 dark:text-slate-400">Subtype</p>
                <p class="mt-2 text-lg font-black text-slate-950 dark:text-white">${escapeHtml(itemSubtypeLabel(item))}</p>
              </div>
              <div class="rounded-lg border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
                <p class="text-xs font-black uppercase tracking-[.14em] text-slate-500 dark:text-slate-400">Stack</p>
                <p class="mt-2 text-lg font-black text-slate-950 dark:text-white">${escapeHtml(item.stack_size || "-")}</p>
              </div>
              <a class="inline-flex items-center justify-center gap-2 rounded-lg bg-blue-600 px-4 py-3 text-sm font-black text-white transition hover:bg-blue-700" href="${escapeHtml(item.source_url)}" target="_blank" rel="noopener noreferrer">
                <span class="material-symbols-rounded text-base" aria-hidden="true">open_in_new</span>PoE2DB
              </a>
            </aside>
          </div>
        </section>
        <div class="grid gap-5 lg:grid-cols-[minmax(0,1.2fr)_minmax(280px,.8fr)]">
          ${effectBlock(item)}
          <div class="grid gap-5">
            ${sectionBlock(pageText("info"), i18nList(item.i18n?.properties, item.properties || []))}
            ${renderRelatedCurrencyItems(item)}
          </div>
        </div>
        <div id="detailComments" data-comments-slot></div>
      `;
      window.PoeTranslationComments?.mount(document.getElementById("detailComments"), {
        entityType: "currency",
        entityId: item.slug,
        entityName: item.name,
        fieldPath: "description",
        sourceText: item.description_en || "",
        translatedText: description
      });
    }
    };
    renderDetail();
    onLocaleChange(renderDetail);
  </script>
</body>

</html>
