        const url = new URL(raw, window.location.origin);
        state = decodePassiveBuildState(url.searchParams.get("build")) || {
          className: "",
          ascendancyName: "",
          nodeIds: [],
          selectedNodeId: "",
          version: ""
        };
        state.className ||= url.searchParams.get("class") || "";
        state.ascendancyName ||= url.searchParams.get("ascendancy") || "";
        state.selectedNodeId ||= url.searchParams.get("node") || "";
        return state.className || state.ascendancyName || state.nodeIds.length || state.selectedNodeId ? state : null;
      } catch {
        return null;
      }
    };

    const copyText = async (value) => {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(value);
        return;
      }
      const textarea = document.createElement("textarea");
      textarea.value = value;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    };

    const copyHoveredNodeDetail = async () => {
      const node = nodesById.get(String(hoveredNodeId));
      if (!node) return;
      try {
        await copyText(nodeDetailText(node));
        showPassiveBuildToast("Đã copy node detail");
      } catch {
        showPassiveBuildToast("Không copy được node detail");
      }
    };

    searchInput.addEventListener("input", () => render({ resetLimit: false }));
    clearPassiveSearch.addEventListener("click", () => {
      searchInput.value = "";
      render({ resetLimit: false });
      searchInput.focus({ preventScroll: true });
    });
    classFilter.addEventListener("input", () => {
      updateAscendancyOptionsForClass({ preserveValue: false });
      selectedNodeId = "";
      syncSpecStartNodes({ resetAllocated: true });
      render({ resetLimit: true });
    });
    ascFilter.addEventListener("input", () => {
      const parentClass = ascendancyClassNames.get(ascFilter.value);
      if (parentClass && classFilter.value === "all") {
        classFilter.value = parentClass;
        updateAscendancyOptionsForClass({ preserveValue: true });
      }
      selectedNodeId = "";
      syncSpecStartNodes({ resetAllocated: true });
      render({ resetLimit: true });
    });
    document.getElementById("resetFilters").addEventListener("click", () => {
      searchInput.value = "";
      classFilter.value = defaultClassValue();
      updateAscendancyOptionsForClass({ preserveValue: false });
      selectedNodeId = "";
      syncSpecStartNodes({ resetAllocated: true });
      render({ resetLimit: true });
    });
    document.querySelectorAll("[data-map-zoom]").forEach((button) => {
      button.addEventListener("click", () => {
        const rect = treeMapViewport.getBoundingClientRect();
        zoomMapAt(button.dataset.mapZoom === "in" ? 1.28 : 1 / 1.28, rect.left + rect.width / 2, rect.top + rect.height / 2);
      });
    });
    fitTreeMap.addEventListener("click", () => fitMapToNodes(mapContentNodes));
    resetTreeMap.addEventListener("click", resetMapView);
    expandTreeMap.addEventListener("click", () => setMapExpanded(true));
    collapseTreeMap.addEventListener("click", () => setMapExpanded(false));
    copyPassiveBuild.addEventListener("click", async () => {
      const url = buildPassiveShareUrl({
        location: window.location.href,
        state: currentPassiveBuildState()
      });
      try {
        await copyText(url);
        showPassiveBuildToast("Đã copy build link");
      } catch {
        showPassiveBuildToast("Không copy được");
      }
    });
    importPassiveBuild.addEventListener("click", () => {
      const value = window.prompt("Dán build link hoặc build code");
      if (value === null) return;
      const state = parsePassiveBuildInput(value);
      if (!state || !applyPassiveBuildState(state)) {
        showPassiveBuildToast("Build không hợp lệ");
        return;
      }
      showPassiveBuildToast("Đã nhập build");
    });
    togglePassiveSummary.addEventListener("click", () => {
      renderPassiveBuildSummary();
      passiveBuildSummary.classList.toggle("hidden");
    });
    closePassiveSummary.addEventListener("click", () => {
      passiveBuildSummary.classList.add("hidden");
    });
    passiveSummaryNodes.addEventListener("click", (event) => {
      const button = event.target.closest("[data-summary-node]");
      if (!button) return;
      openNodeModal(button.dataset.summaryNode);
    });
    passiveSearchSections.addEventListener("click", (event) => {
      const button = event.target.closest("[data-search-node]");
      if (!button) return;
      focusMapNode(button.dataset.searchNode);
    });
    treeMapTooltip.addEventListener("mouseenter", () => {
      mapTooltipPointerInside = true;
      window.clearTimeout(mapTooltipHideTimer);
      mapTooltipHideTimer = 0;
    });
    treeMapTooltip.addEventListener("mouseleave", () => {
      mapTooltipPointerInside = false;
      if (!mapTooltipPinned) scheduleHideMapTooltip(80);
    });
    treeMapViewport.addEventListener("wheel", (event) => {
      event.preventDefault();
      zoomMapAt(event.deltaY < 0 ? 1.18 : 1 / 1.18, event.clientX, event.clientY);
    }, { passive: false });
    treeMapViewport.addEventListener("pointerdown", (event) => {
      if (event.button !== 0 || event.target.closest?.(".passive-map-toolbar, .map-tooltip, .passive-build-summary, .passive-search-results, [data-map-zoom], #fitTreeMap, #resetTreeMap")) return;
      panState.active = true;
      panState.moved = false;
      panState.lastX = event.clientX;
      panState.lastY = event.clientY;
      hideMapTooltip();
      treeMapViewport.classList.remove("is-hovering-node");
      treeMapViewport.classList.add("is-panning");
      treeMapViewport.setPointerCapture?.(event.pointerId);
    });
    treeMapViewport.addEventListener("pointermove", (event) => {
      if (panState.active) {
        const deltaX = event.clientX - panState.lastX;
        const deltaY = event.clientY - panState.lastY;
        if (Math.abs(deltaX) + Math.abs(deltaY) > 3) panState.moved = true;
        panMapBy(deltaX, deltaY);
        panState.lastX = event.clientX;
        panState.lastY = event.clientY;
        return;
      }
      if (mapTooltipPinned) return;
      const node = nodeAtMapEvent(event);
      if (node) {
        treeMapViewport.classList.add("is-hovering-node");
        showMapTooltip(node, event);
      } else {
        treeMapViewport.classList.remove("is-hovering-node");
        scheduleHideMapTooltip();
      }
    });
    treeMapViewport.addEventListener("pointerup", (event) => {
      if (!panState.active) return;
      suppressNextMapClick = panState.moved;
      panState.active = false;
      panState.moved = false;
      treeMapViewport.classList.remove("is-panning");
      treeMapViewport.releasePointerCapture?.(event.pointerId);
      window.setTimeout(() => {
        suppressNextMapClick = false;
      }, 0);
    });
    treeMapViewport.addEventListener("pointerleave", () => {
      treeMapViewport.classList.remove("is-hovering-node");
      if (!panState.active) scheduleHideMapTooltip(80);
    });
    treeMapViewport.addEventListener("pointerover", (event) => {
      const node = nodeAtMapEvent(event);
      if (node) {
        treeMapViewport.classList.add("is-hovering-node");
        showMapTooltip(node, event);
      }
    });
    treeMapViewport.addEventListener("keydown", (event) => {
      const rect = treeMapViewport.getBoundingClientRect();
      if (event.key === "+" || event.key === "=") {
        event.preventDefault();
        zoomMapAt(1.25, rect.left + rect.width / 2, rect.top + rect.height / 2);
      } else if (event.key === "-" || event.key === "_") {
        event.preventDefault();
        zoomMapAt(1 / 1.25, rect.left + rect.width / 2, rect.top + rect.height / 2);
      } else if (event.key === "0") {
        event.preventDefault();
        resetMapView();
      }
    });
    window.addEventListener("resize", () => {
      syncPassiveHeaderHeight();
      mapNeedsFit = true;
      renderMap();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== "hidden") requestMapDraw();
    });
    window.addEventListener("poe-theme-change", () => requestMapDraw());
    treeMapViewport.addEventListener("click", (event) => {
      if (suppressNextMapClick) return;
      const node = nearestNodeAtMapEvent(event);
      if (node) togglePathAllocation(node.id);
    });
    treeMapViewport.addEventListener("dblclick", (event) => {
      const node = nodeAtMapEvent(event);
      if (node) openNodeModal(node.id);
    });
    closeNodeModalBtn.addEventListener("click", closeNodeModal);
    nodeModalActionClose.addEventListener("click", closeNodeModal);
    nodeModal.addEventListener("click", (event) => {
      if (event.target === nodeModal) closeNodeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Alt" && treeMapTooltip.classList.contains("is-visible")) {
        event.preventDefault();
        setMapTooltipPinned(true);
        if (!event.repeat) copyHoveredNodeDetail();
      }
      if (event.key !== "Escape") return;
      if (!nodeModal.classList.contains("hidden")) {
        closeNodeModal();
        return;
      }
      if (document.body.classList.contains("passive-map-expanded")) setMapExpanded(false);
    });
    document.addEventListener("keyup", (event) => {
      if (event.key !== "Alt") return;
      mapTooltipPointerInside = false;
      setMapTooltipPinned(false);
      treeMapViewport.classList.remove("is-hovering-node");
      scheduleHideMapTooltip(80);
    });

      if (initialBuildState) applyPassiveBuildState(initialBuildState);
      else render({ resetLimit: true });
    };

    const showPassiveTreeBootError = (error) => {
      console.error("Passive tree failed to initialize", error);
      const message = "Kh\u00f4ng kh\u1edfi t\u1ea1o \u0111\u01b0\u1ee3c passive tree. H\u00e3y t\u1ea3i l\u1ea1i trang.";
      document.getElementById("resultMeta").textContent = message;
      document.getElementById("treeVersion").textContent = message;
    };

    const startPassiveTree = () => {
      if (!window.POE2_PASSIVE_TREE?.nodes?.length) {
        showPassiveTreeBootError(new Error("Passive tree data is not available"));
        return;
      }
      try {
        initPassiveTree();
      } catch (error) {
        showPassiveTreeBootError(error);
      }
    };

    window.requestAnimationFrame(() => {
      window.setTimeout(startPassiveTree, 0);
    });
  </script>
</body>

</html>
