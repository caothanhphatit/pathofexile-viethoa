# Include this inside the poeviethoa.net server block.
# These exact locations keep production clean URLs mapped to their static HTML
# files so /dictionary, /currency, and detail pages never fall through to 404.html.

location = / {
  try_files /index.html =404;
}

location = /home {
  try_files /index.html =404;
}

location = /patchnote {
  try_files /patchnote_vn.html =404;
}

location = /patch-note {
  try_files /patchnote_vn.html =404;
}

location = /tra-cuu {
  try_files /lookup.html =404;
}

location = /lookup {
  try_files /lookup.html =404;
}

location = /newbie {
  try_files /newbie.html =404;
}

location = /beginner-guide {
  try_files /beginner.html =404;
}

location = /items {
  try_files /items.html =404;
}

location = /dictionary {
  try_files /dictionary.html =404;
}

location = /tu-dien {
  try_files /dictionary.html =404;
}

location = /weapon {
  try_files /weapon.html =404;
}

location = /skill-gems {
  try_files /skill_gems.html =404;
}

location = /skill_gems {
  try_files /skill_gems.html =404;
}

location = /skill-gem {
  try_files /skill_gem_detail.html =404;
}

location = /skill_gem_detail {
  try_files /skill_gem_detail.html =404;
}

location = /currency {
  try_files /currency.html =404;
}

location = /currency-detail {
  try_files /currency_detail.html =404;
}

location = /currency_detail {
  try_files /currency_detail.html =404;
}

location = /passive-tree {
  try_files /passive_tree.html =404;
}

location = /passive_tree {
  try_files /passive_tree.html =404;
}

location = /leveling {
  try_files /leveling.html =404;
}

location / {
  try_files $uri $uri/ /404.html;
}
