# Include this inside the poeviethoa.net server block.
# The public frontend is now a React SPA. Exact clean routes serve the SPA shell;
# static files, data exports, and legacy direct HTML files remain addressable by
# their real file paths.

location = / {
  try_files /index.html =404;
}

