<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency - POE2</title>
  <script src="components/theme-boot.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link href="dist/app.css" rel="stylesheet">
  <script defer src="app-routes.js"></script>
  <script defer src="components/app-shell.js"></script>
  <style>
    label:focus-within {
      box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.6);
      border-color: rgba(217, 119, 6, 0.8);
    }
    .currency-card {
      min-height: 228px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .currency-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(217, 119, 6, 0.15);
      border-color: rgba(217, 119, 6, 0.25);
    }
    .dark .currency-card:hover {
      border-color: rgba(217, 119, 6, 0.35);
      box-shadow: 0 0 25px rgba(217, 119, 6, 0.25);
    }
    .line-clamp-4 {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .currency-cta {
      border: 1px solid rgba(217, 119, 6, 0.28);
      background: rgba(217, 119, 6, 0.12);
      color: #d97706;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .20);
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease, color .16s ease;
    }
    .currency-cta:hover {
      transform: translateY(-1px);
      background: #d97706;
      color: #fff;
      box-shadow: 0 10px 28px rgba(217, 119, 6, 0.28);
    }
    .dark .currency-cta {
      color: #f59e0b;
      background: rgba(217, 119, 6, 0.15);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
    }
    .dark .currency-cta:hover {
      color: #fff;
      background: #d97706;
      box-shadow: 0 0 0 1px rgba(217, 119, 6, 0.3), 0 12px 34px rgba(217, 119, 6, 0.35);
    }
    .currency-icon img { image-rendering: auto; }
  </style>
</head>

<body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
  <div data-component="site-header" data-max-width="1280" data-subtitle="Currency"></div>

  <main class="mx-auto grid max-w-[1280px] gap-4 px-4 py-5 sm:px-6 lg:px-8">
    <section class="glass-panel rounded-2xl p-5 shadow-sm dark:border-slate-800/80" aria-label="Bộ lọc currency">
      <div class="grid gap-3 lg:grid-cols-[minmax(260px,1fr)_180px_210px_120px]">
        <label class="flex h-12 items-center gap-3 rounded-xl border border-slate-200 bg-slate-50/50 px-3.5 transition dark:border-slate-800 dark:bg-slate-900/40">
          <span class="material-symbols-rounded text-slate-500" aria-hidden="true">search</span>
          <input class="min-w-0 flex-1 bg-transparent text-sm font-semibold text-slate-950 outline-none placeholder:text-slate-500 dark:text-slate-100" id="searchInput" name="q" type="search" placeholder="Tìm currency, effect, category..." aria-label="Tìm currency" autocomplete="off">
        </label>
        <select class="h-12 rounded-xl border border-slate-200 bg-white px-3.5 text-xs font-black text-slate-700 outline-none dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200" id="categoryFilter" name="category" aria-label="Lọc theo nhóm"></select>
        <select class="h-12 rounded-xl border border-slate-200 bg-white px-3.5 text-xs font-black text-slate-700 outline-none dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200" id="subtypeFilter" name="subtype" aria-label="Loc theo subtype"></select>
        <button class="inline-flex h-12 items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-3 text-xs font-black text-slate-700 transition hover:bg-slate-100 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800" id="resetFilters" type="button">
          <span class="material-symbols-rounded text-base" aria-hidden="true">restart_alt</span>
          Reset
        </button>
      </div>
      <div class="mt-3 flex flex-wrap items-center justify-between gap-3">
        <div class="flex flex-wrap gap-2" id="subtypePills" aria-label="Subtype currency"></div>
        <div class="flex items-center gap-2">
          <p class="text-xs font-bold text-slate-500 dark:text-slate-400" id="resultMeta">Đang tải dữ liệu.</p>
          <a class="inline-flex h-9 items-center gap-1.5 rounded-lg border border-slate-200 bg-slate-50 px-3 text-xs font-black text-blue-700 transition hover:bg-blue-50 dark:border-slate-700 dark:bg-slate-800 dark:text-blue-300 dark:hover:bg-slate-700" href="https://poe2db.tw/us/Stackable_Currency#StackableCurrencyItem" target="_blank" rel="noopener noreferrer">
            <span class="material-symbols-rounded text-base" aria-hidden="true">open_in_new</span>PoE2DB
          </a>
        </div>
      </div>
    </section>

    <section class="grid gap-3 sm:grid-cols-2 xl:grid-cols-3" id="currencyGrid" aria-live="polite"></section>
    <button class="inline-flex h-11 items-center gap-2 rounded-xl border border-amber-500/28 bg-amber-500/12 text-amber-700 dark:text-amber-300 dark:border-amber-500/30 px-5 text-xs font-black hover:bg-amber-600 hover:text-white transition shadow-sm dark:bg-amber-500/10 mx-auto hidden" id="loadMoreItems" type="button">
      <span class="material-symbols-rounded text-base" aria-hidden="true">expand_more</span>
      Tải thêm
    </button>
  </main>

  <!-- Interactive Currency Detail Modal -->
  <div id="currencyModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-slate-950/70 backdrop-blur-sm transition-all duration-300" role="dialog" aria-modal="true" aria-labelledby="currencyModalTitle">
    <div class="glass-panel w-full max-w-xl rounded-2xl overflow-hidden shadow-2xl transition-all scale-95 duration-300 dark:border-slate-800 dark:bg-slate-900" id="currencyModalContent">
      <!-- Header -->
      <div class="flex items-center justify-between border-b border-slate-100 bg-slate-50/50 px-6 py-4.5 dark:border-slate-800/60 dark:bg-slate-900/60">
        <div class="flex items-center gap-3">
          <div class="relative grid h-10 w-10 shrink-0 place-items-center overflow-hidden rounded-lg border border-slate-200 bg-slate-950 text-white dark:border-slate-700" id="cmodalIconContainer">
            <img class="absolute inset-0 h-full w-full object-contain p-0.5" id="cmodalIcon" src="" alt="" width="40" height="40">
          </div>
          <div>
            <h2 class="font-display text-xl font-black text-slate-950 dark:text-white" id="currencyModalTitle" translate="no">Currency Detail</h2>
            <div class="mt-1 flex flex-wrap items-center gap-1.5" id="cmodalBadges"></div>
          </div>
        </div>
        <button class="grid h-8 w-8 place-items-center rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-white transition" id="closeCurrencyModalBtn" type="button" aria-label="Đóng hộp thoại">
          <span class="material-symbols-rounded text-xl">close</span>
        </button>
      </div>

      <!-- Body -->
      <div class="px-6 py-5 max-h-[70vh] overflow-y-auto space-y-5">
        <!-- Description -->
        <div>
          <h3 class="text-xs font-black text-amber-600 dark:text-amber-400 uppercase tracking-wider">Tác dụng & Hiệu quả</h3>
          <p class="mt-2 text-sm md:text-base font-semibold leading-relaxed text-slate-800 dark:text-slate-200" id="cmodalDescription"></p>
        </div>

        <!-- Properties & Mods -->
        <div class="grid gap-4 md:grid-cols-2 border-t border-slate-100 pt-4 dark:border-slate-800/40">
          <!-- Properties -->
          <div id="cmodalPropertiesContainer">
            <h3 class="text-xs font-black text-slate-500 dark:text-slate-400 uppercase tracking-wider">Thông tin thêm</h3>
            <ul class="mt-2 space-y-1 text-xs font-semibold text-slate-600 dark:text-slate-400" id="cmodalProperties"></ul>
          </div>
          <!-- Mods -->
          <div id="cmodalModsContainer">
            <h3 class="text-xs font-black text-slate-500 dark:text-slate-400 uppercase tracking-wider">Dòng thuộc tính</h3>
            <ul class="mt-2 space-y-1 text-xs font-semibold text-slate-600 dark:text-slate-400" id="cmodalMods"></ul>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="border-t border-slate-100 bg-slate-50/50 px-6 py-3.5 flex justify-end dark:border-slate-800/60 dark:bg-slate-900/60">
        <button class="rounded-xl bg-slate-900 px-4 py-2 text-xs font-black text-white hover:bg-slate-800 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-100 transition shadow-sm" id="cmodalActionClose" type="button">Đóng</button>
      </div>
    </div>
  </div>

  <script src="components/poe-ui-utils.js"></script>
  <script src="currency-data.js"></script>
  <script>
    const data = window.POE2_CURRENCY || { items: [], categories: [], subtypes: [], families: [] };
    const DEFAULT_SUBTYPE = "crafting-orb";
    const nf = new Intl.NumberFormat("vi-VN");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const subtypeFilter = document.getElementById("subtypeFilter");
    const subtypePills = document.getElementById("subtypePills");
    const resultMeta = document.getElementById("resultMeta");
    const currencyGrid = document.getElementById("currencyGrid");
    const loadMoreItems = document.getElementById("loadMoreItems");
    const params = new URLSearchParams(window.location.search);
    let visibleLimit = 60;

    const {
      escapeHtml,
      i18nText,
      i18nList,
      firstPresent,
      truncateText,
      hasCurrencyDescription,
      currencySubtype,
      currencySubtypeLabel,
      currencyCategoryLabel
    } = window.PoeUi;
    const allItems = (data.items || []).filter((item) => item.status === "active" && hasCurrencyDescription(item));

    const shortDescription = (item) => {
      const source = firstPresent([
        i18nText(item.i18n?.description, item.description_en),
        item.description_en,
        ...i18nList(item.i18n?.mods, item.mods || []),
        ...(item.mods || [])
      ]);
      return truncateText(source, { maxLength: 220, minBoundary: 110 });
    };

    const categories = data.categories && data.categories.length
      ? data.categories
      : [...new Map(allItems.map((item) => [item.category, { id: item.category, label: item.category_label, count: allItems.filter((entry) => entry.category === item.category).length }])).values()];
    const itemSubtype = currencySubtype;
    const itemSubtypeLabel = currencySubtypeLabel;
    const itemCategoryLabel = currencyCategoryLabel;
    const subtypes = data.subtypes && data.subtypes.length
      ? data.subtypes
      : (data.families && data.families.length
        ? data.families
        : [...new Map(allItems.map((item) => [itemSubtype(item), {
          id: itemSubtype(item),
          label: itemSubtypeLabel(item),
          count: allItems.filter((entry) => itemSubtype(entry) === itemSubtype(item)).length
        }])).values()]);

    categoryFilter.innerHTML = `<option value="all">Tất cả nhóm</option>${categories.map((category) => `<option value="${escapeHtml(category.id)}">${escapeHtml(category.label)} (${nf.format(category.count)})</option>`).join("")}`;
    subtypeFilter.innerHTML = `<option value="all">Tất cả subtype</option>${subtypes.map((subtype) => `<option value="${escapeHtml(subtype.id)}">${escapeHtml(subtype.label)} (${nf.format(subtype.count)})</option>`).join("")}`;
    subtypePills.innerHTML = subtypes.map((subtype) => `
      <button class="subtype-pill inline-flex h-9 items-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 text-xs font-black text-slate-700 transition hover:bg-white dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700" type="button" data-subtype="${escapeHtml(subtype.id)}">
        <span>${escapeHtml(subtype.label)}</span>
        <span class="rounded bg-white px-1.5 py-0.5 text-[11px] text-slate-500 dark:bg-slate-950 dark:text-slate-300">${nf.format(subtype.count)}</span>
      </button>
    `).join("");

    const setControlValue = (control, value) => {
      if (value && [...control.options].some((option) => option.value === value)) control.value = value;
    };
    searchInput.value = params.get("q") || "";
    setControlValue(categoryFilter, params.get("category"));
    setControlValue(subtypeFilter, params.get("subtype") || params.get("family") || DEFAULT_SUBTYPE);

    const updateUrlState = () => {
      const nextParams = new URLSearchParams();
      if (searchInput.value.trim()) nextParams.set("q", searchInput.value.trim());
      if (categoryFilter.value !== "all") nextParams.set("category", categoryFilter.value);
      if (subtypeFilter.value !== "all") nextParams.set("subtype", subtypeFilter.value);
      const query = nextParams.toString();
      window.history.replaceState(null, "", `${window.location.pathname}${query ? `?${query}` : ""}${window.location.hash}`);
    };

    const itemMatches = (item) => {
      const query = searchInput.value.trim().toLocaleLowerCase("vi");
      const haystack = [
        item.name,
        itemCategoryLabel(item),
        itemSubtypeLabel(item),
        item.stack_size,
        item.description_en,
        i18nText(item.i18n?.description, ""),
        ...(item.properties || []),
        ...(item.mods || []),
        ...i18nList(item.i18n?.mods, item.mods || [])
      ].join(" ").toLocaleLowerCase("vi");
      const categoryOk = categoryFilter.value === "all" || item.category === categoryFilter.value;
      const subtypeOk = subtypeFilter.value === "all" || itemSubtype(item) === subtypeFilter.value;
      return (!query || haystack.includes(query)) && categoryOk && subtypeOk;
    };

    const renderItem = (item) => {
      const description = shortDescription(item);
      const stack = item.stack_size ? `Stack ${item.stack_size}` : itemCategoryLabel(item);
      return `
        <article class="currency-card flex h-full flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
          <div class="flex items-start gap-3">
            <div class="currency-icon relative grid h-12 w-12 shrink-0 place-items-center overflow-hidden rounded-lg border border-slate-200 bg-slate-950 text-white dark:border-slate-700">
              <span class="material-symbols-rounded text-lg opacity-80" aria-hidden="true">toll</span>
              <img class="absolute inset-0 h-full w-full object-contain p-0.5" src="${escapeHtml(item.icon_url)}" alt="${escapeHtml(item.icon_alt || item.name)}" width="48" height="48" loading="lazy" onerror="this.remove()">
            </div>
            <div class="min-w-0 flex-1">
              <div class="flex flex-wrap items-center gap-1.5">
                <span class="rounded-full bg-slate-900 border border-slate-800 text-[10px] font-black text-white px-2 py-0.5 uppercase tracking-wider dark:bg-white dark:text-slate-950 dark:border-white">${escapeHtml(itemCategoryLabel(item))}</span>
                <span class="rounded-full bg-cyan-50 dark:bg-cyan-950/40 text-[10px] font-black text-cyan-700 dark:text-cyan-400 px-2 py-0.5 border border-cyan-500/10 uppercase tracking-wider">${escapeHtml(itemSubtypeLabel(item))}</span>
                <span class="rounded-full bg-slate-100 dark:bg-slate-800/60 text-[10px] font-black text-slate-600 dark:text-slate-400 px-2 py-0.5 border border-slate-200/40 dark:border-slate-700/40 uppercase tracking-wider">${escapeHtml(stack)}</span>
              </div>
              <h2 class="mt-3 break-words text-xl font-black leading-tight text-slate-950 dark:text-white" translate="no">${escapeHtml(item.name)}</h2>
            </div>
          </div>
          <p class="mt-5 text-sm font-semibold leading-relaxed text-slate-600 dark:text-slate-300" title="${escapeHtml(description)}">${escapeHtml(description)}</p>
          <div class="mt-auto pt-4 flex justify-end">
            <a class="currency-cta inline-flex items-center gap-1 rounded-lg px-2.5 py-1.5 text-[11px] font-bold" href="currency_detail.html?slug=${encodeURIComponent(item.slug)}">
              <span class="material-symbols-rounded text-sm" aria-hidden="true">article</span>
              Chi tiết
            </a>
          </div>
        </article>
      `;
    };

    const syncPills = () => {
      document.querySelectorAll(".subtype-pill").forEach((pill) => {
        const active = subtypeFilter.value === pill.dataset.subtype;
        pill.classList.toggle("bg-blue-600", active);
        pill.classList.toggle("text-white", active);
        pill.classList.toggle("border-blue-600", active);
        pill.classList.toggle("ring-2", active);
        pill.classList.toggle("ring-blue-300/60", active);
        pill.classList.toggle("bg-slate-50", !active);
        pill.classList.toggle("text-slate-700", !active);
        pill.classList.toggle("border-slate-200", !active);
        pill.classList.toggle("dark:bg-blue-500", active);
        pill.classList.toggle("dark:border-blue-400", active);
        pill.classList.toggle("dark:text-white", active);
        pill.classList.toggle("dark:bg-slate-800", !active);
        pill.classList.toggle("dark:border-slate-700", !active);
        pill.classList.toggle("dark:text-slate-200", !active);
      });
    };

    const render = ({ resetLimit = false } = {}) => {
      if (resetLimit) visibleLimit = 60;
      const filtered = allItems.filter(itemMatches);
      const visible = filtered.slice(0, visibleLimit);
      currencyGrid.innerHTML = visible.map(renderItem).join("") || `
        <div class="rounded-lg border border-slate-200 bg-white p-6 text-center font-bold text-slate-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-400 sm:col-span-2 xl:col-span-3">
          Không có currency nào khớp bộ lọc.
        </div>
      `;
      const hiddenCount = Math.max(filtered.length - visible.length, 0);
      resultMeta.textContent = `${nf.format(visible.length)} / ${nf.format(filtered.length)} trong ${nf.format(allItems.length)} currency`;
      loadMoreItems.classList.toggle("hidden", hiddenCount === 0);
      loadMoreItems.classList.toggle("inline-flex", hiddenCount > 0);
      loadMoreItems.innerHTML = `<span class="material-symbols-rounded text-base" aria-hidden="true">expand_more</span>Tải thêm ${nf.format(Math.min(60, hiddenCount))}`;
      syncPills();
    };

    [searchInput, categoryFilter, subtypeFilter].forEach((control) => control.addEventListener("input", () => {
      render({ resetLimit: true });
      updateUrlState();
    }));
    subtypePills.addEventListener("click", (event) => {
      const button = event.target.closest("[data-subtype]");
      if (!button) return;
      subtypeFilter.value = subtypeFilter.value === button.dataset.subtype ? "all" : button.dataset.subtype;
      render({ resetLimit: true });
      updateUrlState();
    });
    document.getElementById("resetFilters").addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "all";
      subtypeFilter.value = DEFAULT_SUBTYPE;
      render({ resetLimit: true });
      updateUrlState();
    });
    loadMoreItems.addEventListener("click", () => {
      visibleLimit += 60;
      render();
    });

    render();

    // Currency Modal scripting
    const currencyModal = document.getElementById("currencyModal");
    const currencyModalContent = document.getElementById("currencyModalContent");
    const cmodalIcon = document.getElementById("cmodalIcon");
    const currencyModalTitle = document.getElementById("currencyModalTitle");
    const cmodalBadges = document.getElementById("cmodalBadges");
    const cmodalDescription = document.getElementById("cmodalDescription");
    const cmodalProperties = document.getElementById("cmodalProperties");
    const cmodalPropertiesContainer = document.getElementById("cmodalPropertiesContainer");
    const cmodalMods = document.getElementById("cmodalMods");
    const cmodalModsContainer = document.getElementById("cmodalModsContainer");
    const closeCurrencyModalBtn = document.getElementById("closeCurrencyModalBtn");
    const cmodalActionClose = document.getElementById("cmodalActionClose");

    const openCurrencyModal = (slug) => {
      const item = allItems.find((entry) => entry.slug === slug);
      if (!item) return;

      cmodalIcon.src = item.icon_url;
      cmodalIcon.alt = item.icon_alt || item.name;
      currencyModalTitle.textContent = item.name;

      // Badges
      const stack = item.stack_size ? `Stack ${item.stack_size}` : itemCategoryLabel(item);
      cmodalBadges.innerHTML = `
        <span class="rounded bg-slate-900 border border-slate-800 text-[9px] font-black text-white px-2 py-0.5 uppercase tracking-wider dark:bg-white dark:text-slate-950 dark:border-white border border-slate-200/40 dark:border-slate-700/40">${escapeHtml(itemCategoryLabel(item))}</span>
        <span class="rounded bg-cyan-50 dark:bg-cyan-950/40 text-[9px] font-black text-cyan-700 dark:text-cyan-400 px-2 py-0.5 border border-cyan-500/10 uppercase tracking-wider">${escapeHtml(itemSubtypeLabel(item))}</span>
        <span class="rounded bg-slate-100 dark:bg-slate-800/60 text-[9px] font-black text-slate-600 dark:text-slate-400 px-2 py-0.5 border border-slate-200/40 dark:border-slate-700/40 uppercase tracking-wider">${escapeHtml(stack)}</span>
      `;

      // Description
      cmodalDescription.textContent = i18nText(item.i18n?.description, item.description_en) || shortDescription(item);

      // Properties
      const localizedProps = i18nList(item.i18n?.properties, item.properties || []);
      if (localizedProps.length > 0) {
        cmodalProperties.innerHTML = localizedProps.map(p => `<li class="flex items-center gap-1.5"><span class="material-symbols-rounded text-sm text-slate-400">arrow_right</span>${escapeHtml(p)}</li>`).join("");
        cmodalPropertiesContainer.classList.remove("hidden");
      } else {
        cmodalPropertiesContainer.classList.add("hidden");
      }

      // Mods
      const localizedMods = i18nList(item.i18n?.mods, item.mods || []);
      if (localizedMods.length > 0) {
        cmodalMods.innerHTML = localizedMods.map(m => `<li class="flex items-start gap-1.5"><span class="material-symbols-rounded text-sm text-amber-500 shrink-0 mt-0.5">verified</span><span>${escapeHtml(m)}</span></li>`).join("");
        cmodalModsContainer.classList.remove("hidden");
      } else {
        cmodalModsContainer.classList.add("hidden");
      }

      currencyModal.classList.remove("hidden");
      currencyModal.classList.add("flex");

      setTimeout(() => {
        currencyModalContent.classList.remove("scale-95");
        currencyModalContent.classList.add("scale-100");
      }, 10);
    };

    const closeCurrencyModal = () => {
      currencyModalContent.classList.remove("scale-100");
      currencyModalContent.classList.add("scale-95");
      setTimeout(() => {
        currencyModal.classList.add("hidden");
        currencyModal.classList.remove("flex");
      }, 150);
    };

    // Grid Delegation click to intercept details button clicks
    currencyGrid.addEventListener("click", (event) => {
      const cta = event.target.closest("a[href^='currency_detail.html']");
      if (!cta) return;
      event.preventDefault();
      
      const href = cta.getAttribute("href");
      const urlParams = new URLSearchParams(href.split("?")[1]);
      const slug = urlParams.get("slug");
      openCurrencyModal(slug);
    });

    closeCurrencyModalBtn.addEventListener("click", closeCurrencyModal);
    cmodalActionClose.addEventListener("click", closeCurrencyModal);
    currencyModal.addEventListener("click", (e) => {
      if (e.target === currencyModal) closeCurrencyModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !currencyModal.classList.contains("hidden")) {
        closeCurrencyModal();
      }
    });

    // Check query params on load to automatically open detail modal if slug is specified!
    const querySlug = params.get("slug") || params.get("item");
    if (querySlug) {
      setTimeout(() => openCurrencyModal(querySlug), 200);
    }
  </script>
</body>

</html>
